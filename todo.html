<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TODO</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="main-header">
            <div class="logo">庄司家</div>
            <nav class="nav-links">
                <span id="display-user" class="user-badge"></span>
                <a href="todo.html" class="active">TODO</a>
                <a href="calendar.html">カレンダー</a>
                <button class="logout-btn" onclick="handleLogout()">ログアウト</button>
            </nav>
        </header>

        <main class="main-content">
            <div class="input-header">
                <input type="text" id="task-name" placeholder="何をする？">
                <input type="datetime-local" id="task-deadline">
                <select id="task-priority">
                    <option value="low">低</option>
                    <option value="mid" selected>中</option>
                    <option value="high">高</option>
                </select>
                <button onclick="addTask()">ADD</button>
            </div>
            <div id="task-list"></div>
            <div class="pagination-area">
                <button id="prev-page" class="page-btn" onclick="changePage(-1)">前</button>
                <span id="page-info">1 / 1</span>
                <button id="next-page" class="page-btn" onclick="changePage(1)">次</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
    <script>
        checkAuth();
        showCurrentUser();
        renderTasks();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAL</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="main-header">
            <div class="logo">庄司家</div>
            <nav class="nav-links">
                <span class="user-badge"><i class="fas fa-user"></i> <span id="display-user"></span> さん</span>
                <a href="todo.html">TODO</a>
                <a href="calendar.html" class="active">カレンダー</a>
                <button class="logout-btn" onclick="handleLogout()">ログアウト</button>
            </nav>
        </header>

        <main class="main-content">
            <div id="calendar-full"></div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        checkAuth();
        document.addEventListener('DOMContentLoaded', function() {
            showCurrentUser();
            const calendarEl = document.getElementById('calendar-full');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ja',
                height: '100%',
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                events: JSON.parse(localStorage.getItem('calEvents')) || [],
                selectable: true,
                select: async function(info) {
                    const { value: fV } = await Swal.fire({ title: '予定追加', input: 'text' });
                    if (fV) {
                        const newEv = { id: Date.now().toString(), title: fV, start: info.startStr, backgroundColor: '#5a67d8' };
                        calendar.addEvent(newEv);
                        saveEvent(newEv);
                    }
                }
            });
            calendar.render();
        });
    </script>
</body>
</html>

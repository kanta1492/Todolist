<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - Life Organizer</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="main-header">
            <div class="logo"><strong>LifeOrganizer</strong></div>
            <nav class="nav-links">
                <span id="display-user" class="user-badge"></span>
                <a href="todo.html">TODO</a>
                <a href="calendar.html" class="active">カレンダー</a>
                <button class="logout-btn" onclick="handleLogout()">ログアウト</button>
            </nav>
        </header>

        <main class="main-content">
            <div id="calendar-full"></div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        // ログインチェック
        checkAuth();

        document.addEventListener('DOMContentLoaded', function() {
            showCurrentUser();
            const currentUser = localStorage.getItem('currentUser');
            const calendarEl = document.getElementById('calendar-full');
            
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ja',
                height: '100%',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek'
                },

                // 表示制限設定
                dayMaxEvents: 4, 
                moreLinkClick: 'popover', 

                events: JSON.parse(localStorage.getItem('calEvents')) || [],
                selectable: true,
                
                // --- 新しい予定の追加 ---
                select: async function(info) {
                    const { value: fV } = await Swal.fire({
                        title: '予定を追加',
                        html: `
                            <input id="sw-t" class="swal2-input" placeholder="タイトル">
                            <input id="sw-s" class="swal2-input" type="datetime-local" value="${info.startStr}T09:00">
                            <input id="sw-e" class="swal2-input" type="datetime-local" value="${info.startStr}T10:00">
                        `,
                        preConfirm: () => ({
                            title: document.getElementById('sw-t').value,
                            start: document.getElementById('sw-s').value,
                            end: document.getElementById('sw-e').value
                        })
                    });

                    if (fV && fV.title) {
                        const newId = Date.now().toString();
                        const newEv = { 
                            id: newId,
                            userId: currentUser,
                            title: fV.title, // [ユーザー名]をタイトルから外し、extendedPropsで管理
                            start: fV.start,
                            end: fV.end,
                            backgroundColor: getUserColor(currentUser),
                            extendedProps: { userId: currentUser }
                        };
                        calendar.addEvent(newEv);
                        saveEvent(newEv); 
                    }
                    calendar.unselect();
                },

                // --- 予定のクリック（詳細表示＋自分のなら削除） ---
                eventClick: function(info) {
                    const eventOwner = info.event.extendedProps.userId;
                    const isMine = (eventOwner === currentUser);
                    
                    // 日時のフォーマット整形
                    const startStr = info.event.start.toLocaleString('ja-JP', { 
                        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
                    });

                    Swal.fire({
                        title: '予定の詳細',
                        html: `
                            <div style="text-align: left; padding: 10px; line-height: 1.6;">
                                <p><strong>内容:</strong> ${info.event.title}</p>
                                <p><strong>時間:</strong> ${startStr}</p>
                                <p><strong>担当者:</strong> <span class="user-badge" style="display:inline-block; border-radius:10px;">${eventOwner}</span></p>
                            </div>
                        `,
                        icon: 'info',
                        showCancelButton: true,
                        cancelButtonText: '閉じる',
                        // 自分の予定の場合のみ削除ボタン（Confirmボタン）を表示
                        showConfirmButton: isMine,
                        confirmButtonText: '<i class="fas fa-trash"></i> 削除する',
                        confirmButtonColor: '#ff4d4d',
                        reverseButtons: true
                    }).then((res) => {
                        // 自分の予定かつ削除ボタンが押された場合のみ削除実行
                        if (isMine && res.isConfirmed) {
                            const eventId = info.event.id;
                            
                            // 画面から削除
                            info.event.remove();
                            
                            // ストレージから削除 (script.jsの関数)
                            deleteEvent(eventId);

                            // TODO連動の予定なら、TODOリスト側も削除
                            if (eventId.startsWith('todo-')) {
                                const originalTodoId = eventId.replace('todo-', '');
                                deleteLinkedTodo(originalTodoId);
                            }
                            
                            Swal.fire({
                                toast: true,
                                position: 'top-end',
                                icon: 'success',
                                title: '削除しました',
                                showConfirmButton: false,
                                timer: 1000
                            });
                        }
                    });
                }
            });

            calendar.render();
        });

        // ユーザーごとの色分け
        function getUserColor(user) {
            const colors = {
                'かんた': '#5a67d8',
                'なお': '#48bb78',
                'きょうこ': '#ed8936',
                'としひこ': '#9f7aea'
            };
            return colors[user] || '#a0aec0';
        }
    </script>
</body>
</html>

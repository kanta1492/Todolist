<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Life Organizer</title>
    <!-- SweetAlert2 (アラート用) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ログイン画面専用の追加調整 */
        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .login-card {
            background: var(--white);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 400px; /* ログインカードはさらに少し小さめに */
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 25px;
            color: var(--accent);
            font-size: 1.5rem;
        }
        .login-card select, .login-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #edf2f7;
            border-radius: 10px;
            font-size: 1rem;
            background: #f8fafc;
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-card button:hover {
            background: var(--accent-hover);
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <!-- ヘッダー（ロゴのみのシンプル版） -->
        <header class="main-header" style="justify-content: center;">
            <div class="logo"><strong>LifeOrganizer</strong></div>
        </header>

        <main class="login-container">
            <div class="login-card">
                <h2>おかえりなさい</h2>
                <select id="username">
                    <option value="" disabled selected>名前を選択してください</option>
                    <option value="かんた">かんた</option>
                    <option value="なお">なお</option>
                    <option value="きょうこ">きょうこ</option>
                    <option value="としひこ">としひこ</option>
                </select>
                <input type="password" id="password" placeholder="パスワード">
                <button onclick="handleLogin()">ログイン</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>

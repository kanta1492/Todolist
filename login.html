<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Life Organizer</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="brand-logo">
                    <i class="fas fa-leaf"></i>
                </div>
                <h1>庄司家</h1>
            </div>

            <div class="login-form">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="ユーザー名" onkeypress="if(event.key === 'Enter') handleLogin()">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="パスワード" onkeypress="if(event.key === 'Enter') handleLogin()">
                </div>
                <button class="login-submit-btn" onclick="handleLogin()">
                    ログイン <i class="fas fa-arrow-right"></i>
                </button>
            </div>

            <div class="login-footer">
                <p class="footer-title">Registered Members</p>
                <div class="user-chips">
                    <span>かんた</span>
                    <span>なお</span>
                    <span>きょうこ</span>
                    <span>としひこ</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
